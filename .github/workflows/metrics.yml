name: Metrics

on:
  # Daily refresh
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger
  workflow_dispatch:
  # Re-render when the workflow itself changes
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # ─── 1. Repository spotlight (Sanji) ─────────────────────
      - name: Repository spotlight — Sanji
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.repository.svg
          template: repository
          user: rohanc2k4
          repo: sanji
          config_timezone: America/New_York
          plugin_introduction: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_lines: yes
          plugin_licenses: yes
          plugin_licenses_setup: 0
          plugin_licenses_legal: no

      # ─── 2. Primary metrics + isometric calendar ─────────────
      - name: Primary metrics with isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: rohanc2k4
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_padding: 8%, 5%
          config_animations: yes
          repositories_affiliations: owner, collaborator
          repositories_skipped: rohanc2k4
          plugin_languages: yes
          plugin_languages_ignored: ipynb, html, css, scss, dockerfile, makefile, shell
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ─── 3. GitHub Skyline (standalone — large file) ─────────
      - name: GitHub Skyline
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: rohanc2k4
          filename: metrics.plugin.skyline.svg
          base: ""
          config_timezone: America/New_York
          plugin_skyline: yes
          plugin_skyline_year: 2026
          plugin_skyline_frames: 60
          plugin_skyline_quality: 1

      # ─── 4. Recently starred repos ───────────────────────────
      - name: Recently starred
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: rohanc2k4
          filename: metrics.plugin.stars.svg
          base: ""
          config_timezone: America/New_York
          plugin_stars: yes
          plugin_stars_limit: 6

      # ─── 5. Detailed achievements ────────────────────────────
      - name: Detailed achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: rohanc2k4
          filename: metrics.plugin.achievements.svg
          base: ""
          config_timezone: America/New_York
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
