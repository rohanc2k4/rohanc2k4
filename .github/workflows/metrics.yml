name: Metrics

on:
  # Daily refresh
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger
  workflow_dispatch:
  # Re-render when the workflow itself changes
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # ─── Primary metrics card ────────────────────────────────
      - name: Generate primary metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: rohanc2k4
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_padding: 8%, 5%
          config_animations: yes
          repositories_affiliations: owner, collaborator
          repositories_skipped: rohanc2k4
          plugin_languages: yes
          plugin_languages_ignored: ipynb, html, css, scss, dockerfile, makefile, shell
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # ─── Achievements / extras card ──────────────────────────
      - name: Generate achievements metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: rohanc2k4
          filename: metrics.plugin.achievements.svg
          base: ""
          config_timezone: America/New_York
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
